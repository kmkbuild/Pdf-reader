name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor packages
        run: npm install @capacitor/core@6 @capacitor/android@6 @capacitor/app@6 @capacitor/cli@6

      - name: Build web app
        run: npm run build

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Remove old android folder if exists
        run: rm -rf android

      - name: Add Android platform fresh
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Verify android folder exists
        run: |
          if [ ! -d "android" ]; then
            echo "ERROR: android folder not created!"
            exit 1
          fi
          if [ ! -f "android/gradlew" ]; then
            echo "ERROR: gradlew not found!"
            ls -la android/
            exit 1
          fi
          echo "android folder OK"
          ls -la android/

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Book-Reader-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
